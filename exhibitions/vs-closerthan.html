<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Closer Than They Appear — Molly Burt-Westvig</title>
  <link rel="icon" type="image/png" href="../images/logo_1.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 12px; }
    body { font-family: 'Bitter', Georgia, serif; background: #fff; color: #000; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    * { cursor: none !important; }
    #cursor-dot { position: fixed; width: 8px; height: 8px; background: #000; border-radius: 50%; pointer-events: none; z-index: 99999; transform: translate(-50%,-50%); top:0; left:0; transition: width .15s, height .15s, background .15s, border .15s; }
    #cursor-dot.hovering { width:10px; height:10px; background:transparent; border:1.5px solid #000; }
    .link-hover { text-decoration: none; position: relative; color: inherit; }
    .link-hover::after { content:''; position:absolute; left:0; bottom:-1px; width:0; height:1.5px; background:#CCFF00; transition:width .2s ease; }
    .link-hover:hover::after { width:100%; }
    .mb-nav { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:4px 0; background:#fff; flex-shrink:0; }
    .mb-nav-left { display:flex; align-items:center; padding-left:16px; }
    .mb-nav-name { font-family:'Helvetica World','Helvetica Neue',Helvetica,Arial,sans-serif; font-weight:700; font-size:12px; letter-spacing:.13em; text-transform:uppercase; color:#000; text-decoration:none; }
    .mb-nav-center { display:flex; align-items:center; justify-content:center; }
    .mb-nav-center img { height:100px; object-fit:contain; }
    .mb-nav-right { display:flex; align-items:center; justify-content:flex-end; gap:10px; padding-right:16px; }
    .mb-nav-links { display:flex; align-items:center; gap:10px; list-style:none; }
    .mb-nav-links a { font-family:'Bitter',Georgia,serif; font-weight:400; font-size:9px; letter-spacing:.11em; text-transform:uppercase; color:#000; text-decoration:none; white-space:nowrap; }
    .mb-nav-links a:hover { opacity:.5; }
    .page-body { flex:1; display:grid; grid-template-columns:2fr 1fr; overflow:hidden; min-height:0; }
    .left-col { overflow-y:scroll; display:flex; flex-direction:column; }
    .video-zone { width:100%; aspect-ratio:16/9; flex-shrink:0; background:#111; }
    .video-zone iframe { width:100%; height:100%; border:none; }
    .docs-label { padding:8px 16px; border-top:0.5px solid rgba(0,0,0,.4); border-bottom:0.5px solid rgba(0,0,0,.4); }
    .docs-label span { font-family:'Bitter',Georgia,serif; font-size:12px; color:rgba(0,0,0,.5); }
    .docs-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(0,0,0,.1); }
    .docs-grid img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:#f0f0f0; transition:opacity .15s; }
    .docs-grid img:hover { opacity:.8; }
    .right-col { border-left:0.5px solid rgba(0,0,0,.4); padding:24px 20px; display:flex; flex-direction:column; overflow-y:auto; }
    .back-link { font-family:'Bitter',Georgia,serif; font-size:11px; color:rgba(0,0,0,.4); margin-bottom:20px; display:inline-block; }
    .vs-title { font-family:'Bitter',Georgia,serif; font-size:18px; font-weight:600; line-height:1.3; margin-bottom:12px; }
    .vs-meta { display:flex; flex-direction:column; gap:3px; margin-bottom:16px; }
    .vs-meta span { font-family:'Bitter',Georgia,serif; font-size:12px; color:rgba(0,0,0,.5); line-height:1.5; }
    .vs-divider { border:none; border-top:0.5px solid rgba(0,0,0,.3); width:60%; margin:14px 0; }
    .vs-desc { font-family:'Bitter',Georgia,serif; font-size:12px; line-height:1.9; color:rgba(0,0,0,.6); }
    @media(max-width:768px){body{height:auto;overflow:auto;}.page-body{grid-template-columns:1fr;}.right-col{border-left:none;border-top:0.5px solid rgba(0,0,0,.4);}.mb-nav-center img{height:60px;}}
  </style>
</head>
<body>
<div id="cursor-dot"></div>
<nav class="mb-nav">
  <div class="mb-nav-left"><a href="../index.html" class="mb-nav-name link-hover">Molly Burt-Westvig</a></div>
  <div class="mb-nav-center"><a href="../index.html"><img src="../images/logo_1.png" alt="Logo" class="link-hover"></a></div>
  <div class="mb-nav-right">
    <ul class="mb-nav-links">
      <li><a href="../work.html" class="link-hover">Work</a></li>
      <li><a href="../exhibitions.html" class="link-hover">Exhibitions</a></li>
      <li><a href="../about.html" class="link-hover">About</a></li>
    </ul>
  </div>
</nav>
<div class="page-body">
  <div class="left-col">
    <div class="video-zone">
      <iframe src="https://player.vimeo.com/video/920699518?autoplay=1&loop=1&background=0&controls=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="docs-label"><span>Documentation</span></div>
    <div class="docs-grid">
      <img src="../images/vs_closerthan.png" alt="Closer Than They Appear">
    </div>
  </div>
  <div class="right-col">
    <a href="../work.html" class="back-link link-hover">← Return to Work</a>
    <span class="vs-title">Closer Than They Appear</span>
    <div class="vs-meta">
      <span>2024</span>
      <span>Video projection on handmade bricks</span>
      <span>40 x 40 x 24"</span>
    </div>
    <hr class="vs-divider">
    <p class="vs-desc">Video projection on handmade bricks.</p>
  </div>
</div>
<script>
const dot=document.getElementById('cursor-dot');
document.addEventListener('mousemove',e=>{dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';});
document.querySelectorAll('a,.link-hover').forEach(el=>{el.addEventListener('mouseenter',()=>dot.classList.add('hovering'));el.addEventListener('mouseleave',()=>dot.classList.remove('hovering'));});
</script>
</body>
</html>
