<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molly Burt-Westvig</title>
  <link rel="icon" type="image/png" href="images/Logo_1.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 12px; }
    body { font-family: 'Bitter', Georgia, serif; background: #fff; color: #000; overflow-x: hidden; }

    * { cursor: none !important; }
    #cursor-dot { position: fixed; width: 8px; height: 8px; background: #000; border-radius: 50%; pointer-events: none; z-index: 99999; transform: translate(-50%,-50%); transition: width .15s, height .15s, background .15s, border .15s; top: 0; left: 0; }
    #cursor-dot.hovering { width: 10px; height: 10px; background: transparent; border: 1.5px solid #000; }

    .link-hover { text-decoration: none; position: relative; color: inherit; }
    .link-hover::after { content: ''; position: absolute; left: 0; bottom: -1px; width: 0; height: 1.5px; background: #CCFF00; transition: width .2s ease; }
    .link-hover:hover::after { width: 100%; }

    .mb-nav { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 4px 0; background: #fff; position: sticky; top: 0; z-index: 200; }
    .mb-nav-left { display: flex; align-items: center; padding-left: 16px; }
    .mb-nav-name { font-family: 'Helvetica World','Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 700; font-size: 12px; letter-spacing: .13em; text-transform: uppercase; color: #000; text-decoration: none; }
    .mb-nav-center { display: flex; align-items: center; justify-content: center; }
    .mb-nav-center img { height: 100px; object-fit: contain; }
    .mb-nav-right { display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding-right: 16px; }
    .mb-nav-links { display: flex; align-items: center; gap: 10px; list-style: none; }
    .mb-nav-links li { display: flex; align-items: center; }
    .mb-nav-links a { font-family: 'Bitter',Georgia,serif; font-weight: 400; font-size: 9px; letter-spacing: .11em; text-transform: uppercase; color: #000; text-decoration: none; white-space: nowrap; }
    .mb-nav-links a:hover { opacity: .5; }
    .mb-ig-link { display: flex; align-items: center; opacity: .75; color: #000; }
    .mb-ig-link:hover { opacity: .4; }
    .mb-hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; padding: 2px; }
    .mb-hamburger span { display: block; width: 20px; height: 1.5px; background: #000; }

    .mobile-menu { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(255,255,255,.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); flex-direction: column; padding: 20px 24px 40px; }
    .mobile-menu.open { display: flex; }
    .mobile-menu-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #000; padding-bottom: 12px; margin-bottom: 28px; }
    .mobile-menu-name { font-family: 'Helvetica World','Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 700; font-size: 12px; letter-spacing: .13em; text-transform: uppercase; }
    .mobile-menu-close { background: none; border: none; font-size: 18px; }
    .mobile-menu-links { list-style: none; display: flex; flex-direction: column; gap: 18px; }
    .mobile-menu-links a { font-family: 'Bitter',Georgia,serif; font-size: 24px; letter-spacing: .1em; text-transform: uppercase; color: #000; text-decoration: none; display: block; }

    .cv-backdrop { display: none; position: fixed; inset: 0; z-index: 600; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); background: rgba(255,255,255,.45); align-items: flex-start; justify-content: center; padding: 50px 20px 60px; }
    .cv-backdrop.open { display: flex; }
    .cv-float-wrap { width: 100%; max-width: 50vw; display: flex; flex-direction: column; }
    .cv-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; margin-bottom: 8px; }
    .cv-download, .cv-email, .cv-close { font-family: 'Bitter',Georgia,serif; font-size: 12px; color: #000; text-decoration: none; background: none; border: none; padding: 0; }
    .cv-download { text-align: left; }
    .cv-email { text-align: center; }
    .cv-close { text-align: right; }
    .cv-paper { width: 100%; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,.12), 0 1px 4px rgba(0,0,0,.08); overflow-y: auto; max-height: 80vh; }
    .cv-paper canvas { width: 100%; display: block; }

    .home-video-spacer { height: 20px; }
    .home-video { width: 100%; height: 66vh; min-height: 300px; background: #111; overflow: hidden; position: relative; }
    .home-video iframe { position: absolute; top: 50%; left: 50%; width: 300%; height: 300%; transform: translate(-50%,-50%); border: none; pointer-events: none; }

    .home-below { display: grid; grid-template-columns: 1fr 1fr; margin: 0 28px; }
    .home-col { padding: 24px 0 32px; }
    .home-col:first-child { padding-right: 28px; }
    .home-col:last-child { padding-left: 28px; }
    .home-col-name { font-family: 'Bitter',Georgia,serif; font-size: 12px; color: #000; display: block; line-height: 1.9; }
    .home-col-title { font-family: 'Bitter',Georgia,serif; font-size: 12px; color: #000; display: block; line-height: 1.9; }
    .home-col-year { font-family: 'Bitter',Georgia,serif; font-size: 12px; color: rgba(0,0,0,.5); margin-left: 6px; }
   
    .home-bio { font-family: 'Bitter',Georgia,serif; font-size: 12px; line-height: 1.85; color: rgba(0,0,0,.6); }

    @media (max-width: 768px) {
      .mb-nav-links { display: none; }
      .mb-hamburger { display: flex; }
      .mb-nav-center img { height: 60px; }
      .home-video { height: 50vh; }
      .home-below { grid-template-columns: 1fr 1fr; margin: 0 16px; }
      .home-col:first-child { padding-right: 16px; }
      .home-col:last-child { padding-left: 16px; }
      .home-col-name, .home-col-title, .home-col-year, .home-bio { font-size: 11px; }
      .cv-float-wrap { max-width: 95vw; }
    }
  </style>
</head>
<body>

<div id="cursor-dot"></div>

<nav class="mb-nav">
  <div class="mb-nav-left">
    <a href="index.html" class="mb-nav-name link-hover">Molly Burt-Westvig</a>
  </div>
  <div class="mb-nav-center">
    <a href="index.html"><img id="navLogo" src="images/Logo_1.png" alt="Logo" class="link-hover"></a>
  </div>
  <div class="mb-nav-right">
    <ul class="mb-nav-links">
      <li><a href="work.html" class="link-hover">Work</a></li>
      <li><a href="exhibitions.html" class="link-hover">Exhibitions</a></li>

    </ul>
    <button class="mb-hamburger link-hover" id="mbHamburger" aria-label="Open menu">
      <span></span><span></span><span></span>

  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <div class="mobile-menu-header">
    <span class="mobile-menu-name">Molly Burt-Westvig</span>
    <button class="mobile-menu-close link-hover" id="menuClose">&#215;</button>
  </div>
  <ul class="mobile-menu-links">
    <li><a href="work.html" class="link-hover">Work</a></li>
    <li><a href="exhibitions.html" class="link-hover">Exhibitions</a></li>
    <li><a href="#" class="link-hover" id="cvMobileLink">CV</a></li>
    <li><a href="about.html" class="link-hover">About</a></li>
  </ul>
</div>

<div class="cv-backdrop" id="cvBackdrop">
  <div class="cv-float-wrap">
    <div class="cv-controls">
      <a class="cv-download link-hover" href="MollyBurtWestvig_CV.pdf" download>(Click here to download)</a>
      <!-- ↓ EDIT: Your email -->
      <a class="cv-email link-hover" href="mailto:mollyburtwestvigstudio@gmail.com">(mollyburtwestvigstudio@gmail.com)</a>
      <span class="cv-close link-hover" id="cvClose">(X)</span>
    </div>
    <div class="cv-paper">
      <canvas id="cvCanvas"></canvas>

</div>

<div class="home-col">
    <span class="home-col-name">Molly Burt-Westvig</span>
    ...title span...
  </div>
  <div class="home-col">
    <p class="home-bio">...</p>
    <div class="home-doodle" style="text-align:right; margin-top:16px;">
<img src="images/doodle_exhb_2.png" alt="" style="width:100%; height:auto; display:block;">
  </div>
<script>
  const dot = document.getElementById('cursor-dot');
  document.addEventListener('mousemove', e => { dot.style.left = e.clientX+'px'; dot.style.top = e.clientY+'px'; });
  document.querySelectorAll('a, button, .link-hover').forEach(el => {
    el.addEventListener('mouseenter', () => dot.classList.add('hovering'));
    el.addEventListener('mouseleave', () => dot.classList.remove('hovering'));
  });

  const logoFiles = ['Logo_1.png','Logo_2.png','Logo_3.png','Logo_4.png'];
  let lastLogo = 'Logo_1.png';
  const logoEl = document.getElementById('navLogo');
  if (logoEl) {
    logoEl.addEventListener('click', () => {
      const opts = logoFiles.filter(l => l !== lastLogo);
      const pick = opts[Math.floor(Math.random()*opts.length)];
      lastLogo = pick; logoEl.src = 'images/' + pick;
    });
  }

  const hamburger = document.getElementById('mbHamburger');
  const mobileMenu = document.getElementById('mobileMenu');
  const menuClose = document.getElementById('menuClose');
  if (hamburger) hamburger.addEventListener('click', () => mobileMenu.classList.add('open'));
  if (menuClose) menuClose.addEventListener('click', () => mobileMenu.classList.remove('open'));

  const cvBackdrop = document.getElementById('cvBackdrop');
  const cvClose = document.getElementById('cvClose');
  let pdfLoaded = false;

  function loadPDF() {
    if (pdfLoaded) return;
    pdfLoaded = true;
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = () => {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      pdfjsLib.getDocument('MollyBurtWestvig_CV.pdf').promise.then(pdf => {
        pdf.getPage(1).then(page => {
          const canvas = document.getElementById('cvCanvas');
          const containerWidth = canvas.parentElement.offsetWidth;
          const base = page.getViewport({ scale: 1 });
          const scale = containerWidth / base.width;
          const vp = page.getViewport({ scale });
          canvas.width = vp.width; canvas.height = vp.height;
          canvas.style.width = '100%'; canvas.style.height = 'auto';
          page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
        });
      });
    };
    document.head.appendChild(s);
  }

  document.getElementById('cvNavLink').addEventListener('click', e => { e.preventDefault(); cvBackdrop.classList.add('open'); loadPDF(); });
  const cvMobile = document.getElementById('cvMobileLink');
  if (cvMobile) cvMobile.addEventListener('click', e => { e.preventDefault(); cvBackdrop.classList.add('open'); loadPDF(); });
  if (cvClose) cvClose.addEventListener('click', () => cvBackdrop.classList.remove('open'));
  if (cvBackdrop) cvBackdrop.addEventListener('click', e => { if (e.target === cvBackdrop) cvBackdrop.classList.remove('open'); });
</script>
</body>
</html>
